<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a little about me ✨</title>
 <style>
  .avatar img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
  }
</style>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(180deg, #fce8f0 0%, #fff0f5 40%, #fdf6f0 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #game-wrap {
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  canvas#sakura-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .game-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    min-height: 100vh;
    max-width: 420px;
    margin: 0 auto;
  }

  .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* INTRO */
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #eeb591, #f7ac87);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    border: 3px solid rgba(210,120,130,0.35);
    animation: floatY 3s ease-in-out infinite;
    margin-bottom: 18px;
    box-shadow: 0 4px 24px rgba(210,120,130,0.2);
  }

  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }

  .intro-title {
    font-size: 22px;
    color: #ec859f;
    font-weight: 400;
    margin-bottom: 10px;
    text-align: center;
  }

  .intro-sub {
    font-size: 13px;
    color: #b07080;
    font-style: italic;
    margin-bottom: 36px;
    text-align: center;
    line-height: 1.7;
    max-width: 280px;
  }

  .start-btn {
    background: #e8778a;
    border: none;
    border-radius: 40px;
    padding: 14px 42px;
    font-size: 15px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 18px rgba(232,119,138,0.32);
  }
  .start-btn:hover { background: #d9607a; }
  .start-btn:active { transform: scale(0.96); }

  /* GAME */
  .progress-bar-wrap {
    width: 100%;
    max-width: 340px;
    margin-bottom: 22px;
  }

  .progress-label {
    font-size: 11px;
    color: #b07080;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  .progress-track {
    height: 5px;
    border-radius: 10px;
    background: rgba(232,119,138,0.15);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #e8a0b0, #e8778a);
    transition: width 0.5s ease;
  }

  .card-stage {
    width: 100%;
    max-width: 340px;
    position: relative;
    height: 310px;
    margin-bottom: 22px;
  }

  .hobby-card {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 26px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(232,119,138,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 28px;
    text-align: center;
    box-shadow: 0 8px 36px rgba(210,120,130,0.12);
    transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
    cursor: default;
    user-select: none;
  }

  .hobby-card.back1 {
    transform: translateY(9px) rotate(2.5deg) scale(0.95);
    opacity: 0.48; z-index: 1;
  }
  .hobby-card.back2 {
    transform: translateY(16px) rotate(-2deg) scale(0.9);
    opacity: 0.25; z-index: 0;
  }
  .hobby-card.front {
    transform: none; opacity: 1; z-index: 2;
  }
  .hobby-card.exit-left {
    transform: translateX(-115%) rotate(-20deg) scale(0.87) !important;
    opacity: 0 !important;
    transition: transform 0.36s ease-in, opacity 0.28s !important;
  }
  .hobby-card.exit-right {
    transform: translateX(115%) rotate(20deg) scale(0.87) !important;
    opacity: 0 !important;
    transition: transform 0.36s ease-in, opacity 0.28s !important;
  }
  .hobby-card.pop-in {
    animation: popCard 0.45s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes popCard {
    from { transform: scale(0.78); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .card-icon { font-size: 56px; margin-bottom: 14px; display: block; }

  .card-label {
    font-size: 19px;
    color: #6a2a3a;
    font-weight: 400;
    margin-bottom: 10px;
  }

  .card-text {
    font-size: 13px;
    color: #a06070;
    line-height: 1.68;
    font-style: italic;
    max-width: 250px;
  }

  .card-counter {
    font-size: 10px;
    color: #d4a0a8;
    position: absolute;
    bottom: 15px;
    right: 18px;
    letter-spacing: 0.03em;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .ctrl-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(232,119,138,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.2s, transform 0.12s;
    color: #c0607a;
    box-shadow: 0 2px 12px rgba(210,120,130,0.1);
  }
  .ctrl-btn:hover { background: rgba(232,119,138,0.12); }
  .ctrl-btn:active { transform: scale(0.9); }

  .shuffle-btn {
    background: #e8778a;
    border: none;
    border-radius: 40px;
    padding: 12px 30px;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 3px 16px rgba(232,119,138,0.3);
  }
  .shuffle-btn:hover { background: #d9607a; }
  .shuffle-btn:active { transform: scale(0.96); }

  .dots {
    display: flex;
    gap: 5px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 200px;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(232,119,138,0.2);
    transition: background 0.2s, transform 0.2s;
  }
  .dot.on { background: #e8778a; transform: scale(1.35); }

  .music-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.68);
    border: 1px solid rgba(232,119,138,0.2);
    border-radius: 40px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s;
    max-width: 300px;
    width: 100%;
  }
  .music-row:hover { background: rgba(255,255,255,0.92); }

  .music-note {
    font-size: 18px;
    animation: noteSpin 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes noteSpin {
    0%,100% { transform: rotate(-8deg); }
    50%      { transform: translateY(-3px) rotate(8deg); }
  }

  .music-text { flex: 1; }
  .music-text strong {
    display: block;
    font-size: 12px;
    color: #7a3a4a;
    font-weight: 400;
    margin-bottom: 1px;
  }
  .music-text span { font-size: 10px; color: #b08090; font-style: italic; }

  .viz-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
    flex-shrink: 0;
  }
  .viz-bars span {
    width: 3px;
    border-radius: 2px;
    background: rgba(232,119,138,0.35);
    animation: barB 1s ease-in-out infinite alternate;
  }
  .viz-bars span:nth-child(1){height:6px;animation-delay:0s}
  .viz-bars span:nth-child(2){height:12px;animation-delay:.16s}
  .viz-bars span:nth-child(3){height:8px;animation-delay:.32s}
  .viz-bars span:nth-child(4){height:16px;animation-delay:.48s}
  .viz-bars span:nth-child(5){height:4px;animation-delay:.64s}
  @keyframes barB {
    from { opacity:0.3; transform:scaleY(0.5); }
    to   { opacity:1;   transform:scaleY(1); }
  }
  .viz-bars.live span { background: #e8778a; }

  /* DONE */
  .done-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
  }

  .done-icons {
    font-size: 36px;
    margin-bottom: 22px;
    letter-spacing: 10px;
    animation: floatY 3s ease-in-out infinite;
  }

  .done-title {
    font-size: 22px;
    color: #7a3a4a;
    margin-bottom: 10px;
    text-align: center;
  }

  .done-sub {
    font-size: 13px;
    color: #b07080;
    font-style: italic;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.75;
    max-width: 260px;
  }

  /* BURST PETALS */
  .petal-burst {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    z-index: 10;
    animation: petalBurst 1s ease-out forwards;
  }
  @keyframes petalBurst {
    0%   { opacity:1; transform: translate(0,0) scale(1); }
    100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.2) rotate(200deg); }
  }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="sakura-canvas"></canvas>

  <div class="game-inner">

    <!-- INTRO SCREEN -->
    <div class="screen active" id="screen-intro">
      <div class="avatar">
  <img src="images/avatar.png" alt="Profile avatar" />
      </div>
      <div class="intro-title">hi, a little about me</div>
      <div class="intro-sub">tap through the cards to get to know me — a little piece at a time ✨</div>
      <button class="start-btn" onclick="startGame()">let's go →</button>
    </div>

    <!-- GAME SCREEN -->
    <div class="screen" id="screen-game">
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>getting to know me</span>
          <span id="prog-count">0 / 10</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="card-stage" id="card-stage"></div>

      <div class="controls">
        <button class="ctrl-btn" onclick="go(-1)">←</button>
        <button class="shuffle-btn" onclick="doShuffle()">✦ shuffle</button>
        <button class="ctrl-btn" onclick="go(1)">→</button>
      </div>

      <div class="dots" id="dots"></div>

      <div class="music-row" onclick="toggleMusic()">
        <span class="music-note">♪</span>
        <div class="music-text">
          <strong>Pure — Common Gathering</strong>
          <span id="music-label">tap to play</span>
        </div>
        <div class="viz-bars" id="viz-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- DONE SCREEN -->
    <div class="screen" id="screen-done">
      <div class="done-wrap">
        <div class="done-icons">🌸✨🌷</div>
        <div class="done-title">now you know me a little better</div>
        <div class="done-sub">thanks for taking the time — means more than you know 🙏🏾</div>
        <button class="start-btn" onclick="restart()">shuffle & go again</button>
      </div>
    </div>

  </div>
</div>

<script>
const hobbies = [
  { icon:'🀄', label:'Learning Mandarin', text:'Similar to Twi, it's tonal. Something about unlocking a new language just opens up the world a little more.' },
  { icon:'📓', label:'Journaling', text:'Morning pages to start the day right. I used to bullet journal in middle school. I even had a study Instagram for it.' },
  { icon:'🧘🏾‍♀️', label:'Mat Pilates', text:'I've been consistent with mat pilates for a while now.' },
  { icon:'🧶', label:'Crocheting', text:'Still a beginner but I like how I can get into a "flow-state" with. I usually crochet while watching YouTube, a movie or listening to a podcast.' },
  { icon:'💃🏾', label:'Dancing', text:'Music and movement. No other explanation needed here. Love listening to worship songs and singing' },
  { icon:'🍳', label:'Cooking & Baking', text:'I eat the same meals regularly but I find it fun to learn new recipes.' },
  { icon:'📷', label:'Photography', text:'My brother got a camera and my younger sister and I started a photography "business" which is currently on pause since we're long distance haha.' },
  { icon:'💻', label:'Learning to Code', text:'New and so fun, especially with AI. Still learning but I love the problem-solving and designing side of it.' },
  { icon:'📚', label:'Reading', text:'Picked it back up and so glad I did. Books, articles, newsletters, really anything that makes me actually think.' },
  { icon:'🧩', label:'Jigsaw Puzzles', text:'Did one with family over winter break and loved every second even the moments when we could not find the last piece.' },
];

let order = [], cur = 0, busy = false, seen = 0;
let audioCtx = null, playing = false, musicNodes = [];

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  order = [...Array(hobbies.length).keys()];
  shuffle(order);
  cur = 0; seen = 0; busy = false;
  show('screen-game');
  buildDeck();
  updateDots();
  updateProgress();
}

function restart() {
  stopMusic();
  startGame();
}

function buildDeck() {
  const stage = document.getElementById('card-stage');
  stage.innerHTML = '';
  const total = order.length;
  for (let layer = 2; layer >= 0; layer--) {
    const idx = order[(cur + layer) % total];
    const h = hobbies[idx];
    const card = document.createElement('div');
    card.className = 'hobby-card ' + (layer === 0 ? 'front pop-in' : layer === 1 ? 'back1' : 'back2');
    card.id = 'c' + layer;
    card.innerHTML = `
      <div class="card-icon">${h.icon}</div>
      <div class="card-label">${h.label}</div>
      <div class="card-text">${h.text}</div>
      <div class="card-counter">${seen + 1} of ${total}</div>
    `;
    stage.appendChild(card);
  }
}

function go(dir) {
  if (busy) return;
  busy = true;
  const front = document.getElementById('c0');
  front.classList.remove('front');
  front.classList.add(dir > 0 ? 'exit-right' : 'exit-left');
  burstPetals(front);
  playPop();
  setTimeout(() => {
    if (dir > 0) {
      seen = Math.min(seen + 1, order.length - 1);
      cur = (cur + 1) % order.length;
    } else {
      cur = (cur - 1 + order.length) % order.length;
    }
    buildDeck();
    updateDots();
    updateProgress();
    busy = false;
    if (seen >= order.length - 1 && dir > 0) {
      setTimeout(() => show('screen-done'), 500);
    }
  }, 370);
}

function doShuffle() {
  if (busy) return;
  busy = true;
  const stage = document.getElementById('card-stage');
  const cards = stage.querySelectorAll('.hobby-card');
  cards.forEach((c, i) => {
    c.style.transition = 'transform 0.28s, opacity 0.22s';
    c.style.transform = `translateY(${-18 + i * 7}px) rotate(${(Math.random() - .5) * 24}deg) scale(0.86)`;
    c.style.opacity = '0.2';
  });
  burstPetals(document.getElementById('c0'));
  playPop();
  setTimeout(() => {
    shuffle(order); cur = 0; seen = 0;
    buildDeck(); updateDots(); updateProgress();
    busy = false;
  }, 320);
}

function updateDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  order.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' on' : '');
    c.appendChild(d);
  });
}

function updateProgress() {
  const pct = Math.round((seen / order.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = seen + ' / ' + order.length;
}

function burstPetals(el) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const wrap = document.getElementById('game-wrap').getBoundingClientRect();
  const cx = rect.left - wrap.left + rect.width / 2;
  const cy = rect.top - wrap.top + rect.height / 2;
  const emojis = ['🌸', '🌷', '✨', '🌸', '🌷'];
  emojis.forEach((e, i) => {
    const p = document.createElement('div');
    p.className = 'petal-burst';
    p.textContent = e;
    const angle = (i / emojis.length) * 2 * Math.PI;
    const dist = 55 + Math.random() * 45;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    document.getElementById('game-wrap').appendChild(p);
    setTimeout(() => p.remove(), 1100);
  });
}

function playPop() {
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = 'sine';
    o.frequency.value = 660;
    o.frequency.exponentialRampToValueAtTime(880, c.currentTime + 0.1);
    g.gain.setValueAtTime(0.07, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.28);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.3);
  } catch(e) {}
}

function startMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    const melody = [0, 2, 4, 7, 4, 2, 0, 5, 2, 4, 7, 4, 0, 2, 4, 2];
    let t = audioCtx.currentTime + 0.2;
    const gap = 1.0;

    melody.forEach((ni, i) => {
      const freq = scale[ni % scale.length];
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t + i * gap);
      g.gain.linearRampToValueAtTime(0.055, t + i * gap + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * gap + 0.85);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + i * gap); o.stop(t + i * gap + 0.95);
      musicNodes.push(o, g);
    });

    [[0,2,4],[4,5,7],[2,4,7],[0,2,5]].forEach((ch, ci) => {
      ch.forEach(ni => {
        const freq = scale[ni] * 0.5;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        const st = t + ci * gap * 4;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.022, st + 0.4);
        g.gain.linearRampToValueAtTime(0.018, st + gap * 3.5);
        g.gain.exponentialRampToValueAtTime(0.001, st + gap * 4.2);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(st); o.stop(st + gap * 4.3);
        musicNodes.push(o, g);
      });
    });

    playing = true;
    document.getElementById('viz-bars').classList.add('live');
    document.getElementById('music-label').textContent = 'playing softly';
  } catch(e) {}
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e) {} });
  musicNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  playing = false;
  const vb = document.getElementById('viz-bars');
  const ml = document.getElementById('music-label');
  if (vb) vb.classList.remove('live');
  if (ml) ml.textContent = 'tap to play';
}

function toggleMusic() { playing ? stopMusic() : startMusic(); }

// SAKURA CANVAS
const canvas = document.getElementById('sakura-canvas');
const ctx = canvas.getContext('2d');
let petals = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function makePetal() {
  return {
    x: Math.random() * canvas.width,
    y: -20,
    size: 7 + Math.random() * 11,
    speedY: 0.55 + Math.random() * 0.95,
    speedX: -0.4 + Math.random() * 0.8,
    rotation: Math.random() * 360,
    rotSpeed: -0.8 + Math.random() * 1.6,
    opacity: 0.5 + Math.random() * 0.45,
    sway: Math.random() * 2 * Math.PI,
    swaySpeed: 0.012 + Math.random() * 0.018,
  };
}

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation * Math.PI / 180);
  ctx.globalAlpha = p.opacity;
  ctx.fillStyle = '#f4a0b5';
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size * 0.52, p.size, 0, 0, 2 * Math.PI);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath();
  ctx.ellipse(-p.size * 0.08, -p.size * 0.18, p.size * 0.18, p.size * 0.48, 0, 0, 2 * Math.PI);
  ctx.fill();
  ctx.restore();
}

function animateSakura() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (petals.length < 42 && Math.random() < 0.055) petals.push(makePetal());
  petals.forEach(p => {
    p.sway += p.swaySpeed;
    p.x += p.speedX + Math.sin(p.sway) * 0.55;
    p.y += p.speedY;
    p.rotation += p.rotSpeed;
    drawPetal(p);
  });
  petals = petals.filter(p => p.y < canvas.height + 30);
  requestAnimationFrame(animateSakura);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
animateSakura();
</script>
</body>
</html>
